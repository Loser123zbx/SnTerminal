name: Build and Release SnTerminal

on:
  push:
    tags:
      - "v*" # 只有推送 tag 时触发（例如 v0.0.1）

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: [3.11]
    steps:
      # 步骤 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 2: 设置 Python 环境
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      # 步骤 3: 安装依赖（含编译器）
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc zip
          python -m pip install --upgrade pip
          pip install pyinstaller wxpython==4.2.5 colorama

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install -y mingw
          python -m pip install --upgrade pip
          pip install pyinstaller wxpython==4.2.5 colorama

      # 步骤 4: 编译 os_command 模块
      - name: Compile os_command (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          gcc -shared -fPIC -o src/os_command.dll src/os_command.c

      - name: Compile os_command (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          gcc -shared -fPIC -o src/os_command.so src/os_command.c

      # 步骤 5: 使用 PyInstaller 打包 terminal.py
      - name: Package terminal.py
        run: |
          pyinstaller --onefile --distpath ./dist src/terminal.py

      # 步骤 6: 使用 PyInstaller 打包 gui.py
      - name: Package gui.py
        run: |
          pyinstaller --onefile --distpath ./dist src/gui.py

      # 步骤 7: 创建 ZIP 包
      - name: Create ZIP package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p release
          cp dist/* release/
          cp src/os_command.dll release/
          cp src/version.txt release/
          cd release
          zip -r ../SnTerminal-windows-latest.zip *

      - name: Create ZIP package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p release
          cp dist/* release/
          cp src/os_command.so release/
          cp src/version.txt release/
          cd release
          zip -r ../SnTerminal-ubuntu-latest.zip *

      # 步骤 8: 上传构建产物
      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: SnTerminal-windows-latest
          path: SnTerminal-windows-latest.zip

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: SnTerminal-ubuntu-latest
          path: SnTerminal-ubuntu-latest.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # 步骤 1: 检出代码（可选）
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 2: 下载构建产物
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # 步骤 3-4: 创建 GitHub Release（直接用 tag 名字）
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            自动构建的 SnTerminal 发布版本。
            包含 Windows 和 Linux 平台的可执行文件及动态链接库。
          files: |
            artifacts/SnTerminal-windows-latest/SnTerminal-windows-latest.zip
            artifacts/SnTerminal-ubuntu-latest/SnTerminal-ubuntu-latest.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}